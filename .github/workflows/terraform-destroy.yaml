name: Terraform Destroy
run-name: >
  Destroy AWS Resources by ${{ github.actor }} on ${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment to deploy
        type: environment
        required: true


concurrency:
  group: terraform-destroy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write      # needed for OIDC
  contents: read       # needed for checkout / Terraform

jobs:
  terraform-destroy:
    name: Terraform Destroy
    uses: subhamay-bhattacharyya-gha/terraform-destroy-wf/.github/workflows/terraform-destroy.yaml@feature/GHA-0032-add-platform-based-multi
    with:
      cloud-provider: aws
      backend-type: remote
    secrets:
      tfc-token: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO_SNOWFLAKE_ORG }}